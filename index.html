<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo-PPI Explorer</title>
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
  }
  header {
    padding: 24px 32px;
    background: #161822;
    border-bottom: 1px solid #2a2d3a;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #fff;
  }
  header p {
    font-size: 0.85rem;
    color: #8b8fa3;
    margin-top: 4px;
  }
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 12px;
    font-size: 0.8rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-swatch {
    width: 24px;
    height: 4px;
    border-radius: 2px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
    gap: 16px;
    padding: 24px 32px;
  }
  .card {
    background: #1a1d2b;
    border: 1px solid #2a2d3a;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #3a3f55; }
  .card-header {
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #2a2d3a;
  }
  .card-title {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
  }
  .card-title span {
    color: #ff6b6b;
    font-weight: 400;
    margin-left: 6px;
  }
  .card-stats {
    display: flex;
    gap: 12px;
    font-size: 0.75rem;
  }
  .stat {
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .stat-go { background: rgba(239,68,68,0.15); color: #f87171; }
  .stat-lo { background: rgba(34,197,94,0.15); color: #4ade80; }
  .cy-container {
    width: 100%;
    height: 480px;
    background: #12141e;
  }
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #1a1d2b;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    width: 92vw;
    height: 88vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #2a2d3a;
  }
  .modal-header h2 { font-size: 1.1rem; color: #fff; }
  .modal-close {
    background: none;
    border: 1px solid #3a3f55;
    color: #8b8fa3;
    font-size: 1.2rem;
    cursor: pointer;
    border-radius: 6px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { color: #fff; border-color: #555; }
  .modal-body {
    flex: 1;
    position: relative;
  }
  .expand-btn {
    background: none;
    border: 1px solid #3a3f55;
    color: #8b8fa3;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 4px;
    padding: 2px 8px;
  }
  .expand-btn:hover { color: #fff; border-color: #555; }
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    font-size: 1.1rem;
    color: #8b8fa3;
  }
  .filter-bar {
    padding: 12px 32px;
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 0.85rem;
  }
  .filter-bar label { color: #8b8fa3; }
  .filter-bar select {
    background: #1a1d2b;
    color: #e0e0e0;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<header>
  <h1>Neo-PPI Explorer</h1>
  <p>Mutation-directed neo-protein-protein interactions &mdash; Mo et al., Cell 2022</p>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background: #ef4444;"></div>
      Go-PPI (gained)
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: #22c55e;"></div>
      Lo-PPI (lost)
    </div>
    <div class="legend-item" style="color: #8b8fa3;">
      Darker edge = higher differential score
    </div>
  </div>
</header>

<div class="filter-bar">
  <label>Filter gene:</label>
  <select id="gene-filter">
    <option value="all">All genes</option>
  </select>
</div>

<div id="grid" class="grid">
  <div class="loading" id="loading">Loading data...</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const DS_MIN = 0.088;
const DS_MAX = 13.17;

function classifyPpiType(ppiType) {
  if (ppiType === 'comPPI') return 'com';
  if (ppiType.includes('Go-PPI')) return 'go';
  if (ppiType.includes('Lo-PPI')) return 'lo';
  return null;
}

function getEdgeColor(ppiClass, ds) {
  // Normalize ds to 0-1 using log scale (values range widely)
  const logMin = Math.log(DS_MIN);
  const logMax = Math.log(DS_MAX);
  const logDs = Math.log(Math.max(ds, DS_MIN));
  const t = Math.min(1, Math.max(0, (logDs - logMin) / (logMax - logMin)));

  // opacity from 0.25 (low) to 1.0 (high)
  const opacity = 0.25 + t * 0.75;

  if (ppiClass === 'go') return `rgba(239, 68, 68, ${opacity})`;
  if (ppiClass === 'lo') return `rgba(34, 197, 94, ${opacity})`;
  if (ppiClass === 'com') return `rgba(59, 130, 246, ${opacity})`;
  return `rgba(150, 150, 150, ${opacity})`;
}

function parseTSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split('\t');
  return lines.slice(1).map(line => {
    const vals = line.split('\t');
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i]);
    return obj;
  });
}

function groupByMutation(rows) {
  const groups = {};
  for (const row of rows) {
    const key = `${row.tumor_driver}\t${row.mutation}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(row);
  }
  return groups;
}

function buildCyElements(rows, mutationKey) {
  const [driver, mutation] = mutationKey.split('\t');
  const driverNodeId = `${driver}_${mutation}`;
  const nodes = [{ data: { id: driverNodeId, label: `${driver}\n${mutation}`, isDriver: true } }];
  const edges = [];
  const partnerSet = new Set();

  for (const row of rows) {
    const ppiClass = classifyPpiType(row.ppi_type);
    if (!ppiClass || ppiClass === 'com') continue; // skip ND and comPPI

    const partnerId = row.partner;
    if (!partnerSet.has(partnerId)) {
      partnerSet.add(partnerId);
      nodes.push({ data: { id: partnerId, label: partnerId, isDriver: false } });
    }

    const ds = parseFloat(row.differential_score);
    const dsLabel = isNaN(ds) ? row.differential_score : ds.toFixed(2);
    const color = getEdgeColor(ppiClass, isNaN(ds) ? 1 : ds);

    edges.push({
      data: {
        id: `${driverNodeId}-${partnerId}-${ppiClass}`,
        source: driverNodeId,
        target: partnerId,
        dsLabel: dsLabel,
        color: color,
        ppiClass: ppiClass,
        ds: isNaN(ds) ? 0 : ds,
      }
    });
  }

  return { nodes, edges };
}

function countTypes(rows) {
  let go = 0, lo = 0, com = 0;
  for (const row of rows) {
    const c = classifyPpiType(row.ppi_type);
    if (c === 'go') go++;
    else if (c === 'lo') lo++;
    else if (c === 'com') com++;
  }
  return { go, lo, com };
}

function createCyInstance(container, elements, small) {
  return cytoscape({
    container: container,
    elements: [...elements.nodes, ...elements.edges],
    style: [
      {
        selector: 'node[?isDriver]',
        style: {
          'background-color': '#fbbf24',
          'label': 'data(label)',
          'color': '#fff',
          'font-size': small ? '10px' : '13px',
          'text-valign': 'center',
          'text-halign': 'center',
          'width': small ? 40 : 60,
          'height': small ? 40 : 60,
          'font-weight': 'bold',
          'text-wrap': 'wrap',
          'text-max-width': small ? '38px' : '56px',
          'border-width': 2,
          'border-color': '#f59e0b',
        }
      },
      {
        selector: 'node[!isDriver]',
        style: {
          'background-color': '#2a2d3a',
          'label': 'data(label)',
          'color': '#bbb',
          'font-size': small ? '5px' : '9px',
          'text-valign': 'bottom',
          'text-halign': 'center',
          'text-margin-y': small ? 3 : 5,
          'width': small ? 8 : 14,
          'height': small ? 8 : 14,
          'border-width': 1,
          'border-color': '#3a3f55',
        }
      },
      {
        selector: 'edge',
        style: {
          'line-color': 'data(color)',
          'width': small ? 1 : 2,
          'opacity': 0.9,
          'curve-style': 'bezier',
          'label': small ? '' : 'data(dsLabel)',
          'font-size': '7px',
          'color': '#888',
          'text-rotation': 'autorotate',
          'text-margin-y': -8,
        }
      },
      {
        selector: 'edge[ppiClass="go"]',
        style: { 'line-style': 'solid' }
      },
      {
        selector: 'edge[ppiClass="lo"]',
        style: { 'line-style': 'dashed' }
      },
    ],
    layout: {
      name: 'concentric',
      concentric: function(node) {
        return node.data('isDriver') ? 10 : 1;
      },
      levelWidth: function() { return 1; },
      minNodeSpacing: small ? 8 : 20,
      animate: false,
    },
    userZoomingEnabled: true,
    userPanningEnabled: true,
    boxSelectionEnabled: false,
  });
}

let allData = {};
let allCards = {};

async function init() {
  const resp = await fetch('Emory_CTD2_neoPPI_qHT_dS.txt');
  const text = await resp.text();
  const rows = parseTSV(text);
  const groups = groupByMutation(rows);

  // Populate gene filter (only genes with neo-PPIs)
  const genesWithNeo = new Set();
  for (const [key, rows] of Object.entries(groups)) {
    const c = countTypes(rows);
    if (c.go > 0 || c.lo > 0) genesWithNeo.add(key.split('\t')[0]);
  }
  const genes = [...genesWithNeo].sort();
  const filterEl = document.getElementById('gene-filter');
  for (const g of genes) {
    const opt = document.createElement('option');
    opt.value = g;
    opt.textContent = g;
    filterEl.appendChild(opt);
  }
  filterEl.addEventListener('change', () => {
    const val = filterEl.value;
    for (const [key, card] of Object.entries(allCards)) {
      const gene = key.split('\t')[0];
      card.style.display = (val === 'all' || gene === val) ? '' : 'none';
    }
  });

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const sortedKeys = Object.keys(groups).sort();

  for (const key of sortedKeys) {
    const mutRows = groups[key];
    const [driver, mutation] = key.split('\t');
    const counts = countTypes(mutRows);

    // Skip mutations with no neo-PPIs
    if (counts.go === 0 && counts.lo === 0) continue;

    const elements = buildCyElements(mutRows, key);

    const card = document.createElement('div');
    card.className = 'card';
    allCards[key] = card;

    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${driver}<span>${mutation}</span></div>
        <div class="card-stats">
          <div class="stat stat-go">Go: ${counts.go}</div>
          <div class="stat stat-lo">Lo: ${counts.lo}</div>
          <button class="expand-btn" data-key="${key}">Expand &#x2197;</button>
        </div>
      </div>
      <div class="cy-container" id="cy-${driver}-${mutation}"></div>
    `;

    grid.appendChild(card);

    // Store elements for expand
    allData[key] = elements;

    // Render small graph
    requestAnimationFrame(() => {
      const container = document.getElementById(`cy-${driver}-${mutation}`);
      if (container) createCyInstance(container, elements, true);
    });
  }

  // Expand button handlers
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.expand-btn');
    if (!btn) return;
    const key = btn.dataset.key;
    const [driver, mutation] = key.split('\t');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');

    modalTitle.textContent = `${driver} ${mutation}`;
    modalBody.innerHTML = '';
    modal.classList.add('active');

    requestAnimationFrame(() => {
      const cy = createCyInstance(modalBody, allData[key], false);
      cy.resize();
      cy.fit();
    });
  });

  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('modal').classList.remove('active');
    document.getElementById('modal-body').innerHTML = '';
  });

  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
      document.getElementById('modal').classList.remove('active');
      document.getElementById('modal-body').innerHTML = '';
    }
  });
}

init();
</script>
</body>
</html>
