<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo-PPI Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #f5f6fa;
    color: #1a1a2e;
    min-height: 100vh;
  }
  header {
    background: #fff;
    border-bottom: 1px solid #e2e4ec;
    padding: 28px 40px;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
  }
  header h1 span {
    background: linear-gradient(135deg, #e74c3c, #e67e22);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header p {
    font-size: 0.85rem;
    color: #6b7194;
    margin-top: 4px;
  }
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 14px;
    font-size: 0.78rem;
    color: #6b7194;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-swatch {
    width: 20px;
    height: 4px;
    border-radius: 2px;
  }

  .filter-bar {
    padding: 16px 40px;
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 0.85rem;
  }
  .filter-bar label {
    color: #6b7194;
    font-weight: 500;
  }
  .filter-bar select {
    background: #fff;
    color: #1a1a2e;
    border: 1px solid #d1d5e4;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
  }
  .filter-bar select:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
    padding: 8px 40px 40px;
  }

  .card {
    background: #fff;
    border: 1px solid #e2e4ec;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card:hover {
    border-color: #6366f1;
    box-shadow: 0 4px 20px rgba(99,102,241,0.1);
    transform: translateY(-2px);
  }
  .card-header {
    padding: 18px 20px 14px;
  }
  .card-gene {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #6366f1;
    margin-bottom: 4px;
  }
  .card-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #1a1a2e;
  }
  .card-title .mutation {
    color: #e74c3c;
    font-weight: 600;
  }

  .card-badges {
    display: flex;
    gap: 8px;
    padding: 0 20px;
    margin-bottom: 14px;
  }
  .badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .badge-go {
    background: #f0fdf4;
    color: #16a34a;
    border: 1px solid #bbf7d0;
  }
  .badge-lo {
    background: #fef2f2;
    color: #dc2626;
    border: 1px solid #fecaca;
  }

  .seq-block {
    padding: 14px 20px;
    background: #f8f9fc;
    border-top: 1px solid #eef0f6;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.8;
  }
  .seq-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3c0;
    margin-bottom: 2px;
  }
  .seq-row {
    display: flex;
    gap: 0;
    flex-wrap: nowrap;
  }
  .seq-pos {
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem;
    color: #b0b5cc;
    margin-right: 8px;
    min-width: 28px;
    text-align: right;
    line-height: 1.8;
  }
  .aa {
    display: inline-block;
    width: 18px;
    text-align: center;
    color: #4a5078;
  }
  .aa-wt-highlight {
    background: #dbeafe;
    color: #1d4ed8;
    font-weight: 700;
    border-radius: 3px;
  }
  .aa-mut-highlight {
    background: #fee2e2;
    color: #dc2626;
    font-weight: 700;
    border-radius: 3px;
  }

  .card-footer {
    padding: 10px 20px;
    border-top: 1px solid #eef0f6;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    font-size: 0.75rem;
    color: #9ca3c0;
  }
  .card-footer .arrow {
    margin-left: 4px;
    transition: transform 0.2s;
  }
  .card:hover .card-footer .arrow {
    transform: translateX(3px);
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 50vh;
    font-size: 1rem;
    color: #9ca3c0;
  }
</style>
</head>
<body>

<header>
  <h1><span>Neo-PPI</span> Explorer</h1>
  <p>Mutation-directed neo-protein-protein interactions &mdash; Mo et al., <em>Cell</em> 2022</p>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background: #22c55e;"></div>
      Go-PPI (gained interaction)
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background: #ef4444;"></div>
      Lo-PPI (lost interaction)
    </div>
    <div class="legend-item" style="margin-left: 12px; font-style: italic;">
      Click a card to explore the interaction network
    </div>
  </div>
</header>

<div class="filter-bar">
  <label>Gene:</label>
  <select id="gene-filter">
    <option value="all">All genes</option>
  </select>
</div>

<div id="grid" class="grid">
  <div class="loading" id="loading">Loading data...</div>
</div>

<script>
function parseTSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split('\t');
  return lines.slice(1).map(line => {
    const vals = line.split('\t');
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i]);
    return obj;
  });
}

function classifyPpiType(ppiType) {
  if (ppiType === 'comPPI') return 'com';
  if (ppiType.includes('Go-PPI')) return 'go';
  if (ppiType.includes('Lo-PPI')) return 'lo';
  return null;
}

function countTypes(rows) {
  let go = 0, lo = 0;
  for (const row of rows) {
    const c = classifyPpiType(row.ppi_type);
    if (c === 'go') go++;
    else if (c === 'lo') lo++;
  }
  return { go, lo };
}

function renderSequence(seqStr, mutIdx, cssClass) {
  return seqStr.split('').map((aa, i) => {
    const cls = i === mutIdx ? cssClass : '';
    return `<span class="aa ${cls}">${aa}</span>`;
  }).join('');
}

async function init() {
  const [tsvResp, seqResp] = await Promise.all([
    fetch('Emory_CTD2_neoPPI_qHT_dS.txt'),
    fetch('sequences.json'),
  ]);
  const tsvText = await tsvResp.text();
  const seqData = await seqResp.json();
  const rows = parseTSV(tsvText);

  // Group by mutation
  const groups = {};
  for (const row of rows) {
    const key = `${row.tumor_driver}\t${row.mutation}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(row);
  }

  // Find genes with neo-PPIs
  const genesWithNeo = new Set();
  const keysWithNeo = [];
  for (const [key, mutRows] of Object.entries(groups)) {
    const c = countTypes(mutRows);
    if (c.go > 0 || c.lo > 0) {
      keysWithNeo.push(key);
      genesWithNeo.add(key.split('\t')[0]);
    }
  }
  keysWithNeo.sort();

  // Populate filter
  const filterEl = document.getElementById('gene-filter');
  const genesSorted = [...genesWithNeo].sort();
  for (const g of genesSorted) {
    const opt = document.createElement('option');
    opt.value = g;
    opt.textContent = g;
    filterEl.appendChild(opt);
  }

  const allCards = {};
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (const key of keysWithNeo) {
    const [gene, mutation] = key.split('\t');
    const counts = countTypes(groups[key]);
    const seqKey = `${gene}_${mutation}`;
    const seq = seqData[seqKey];

    const card = document.createElement('a');
    card.className = 'card';
    card.href = `mutation.html?gene=${gene}&mutation=${mutation}`;
    allCards[key] = card;

    const wtSeqHtml = seq
      ? `<div class="seq-row"><span class="seq-pos">${seq.seq_start}</span>${renderSequence(seq.wt_flank, seq.mut_idx, 'aa-wt-highlight')}</div>`
      : '';
    const mutSeqHtml = seq
      ? `<div class="seq-row"><span class="seq-pos">${seq.seq_start}</span>${renderSequence(seq.mut_flank, seq.mut_idx, 'aa-mut-highlight')}</div>`
      : '';

    card.innerHTML = `
      <div class="card-header">
        <div class="card-gene">${gene}</div>
        <div class="card-title">${gene} <span class="mutation">${mutation}</span></div>
      </div>
      <div class="card-badges">
        ${counts.go > 0 ? `<span class="badge badge-go">${counts.go} gained</span>` : ''}
        ${counts.lo > 0 ? `<span class="badge badge-lo">${counts.lo} lost</span>` : ''}
      </div>
      <div class="seq-block">
        <div class="seq-label">Wild type</div>
        ${wtSeqHtml}
        <div class="seq-label" style="margin-top:6px;">Mutant</div>
        ${mutSeqHtml}
      </div>
      <div class="card-footer">
        View interaction network <span class="arrow">&rarr;</span>
      </div>
    `;

    grid.appendChild(card);
  }

  // Also add cards without neo-PPIs (TP53, PTEN) but greyed out
  const sortedAllKeys = Object.keys(groups).sort();
  for (const key of sortedAllKeys) {
    if (keysWithNeo.includes(key)) continue;
    const [gene, mutation] = key.split('\t');
    const seqKey = `${gene}_${mutation}`;
    const seq = seqData[seqKey];

    const card = document.createElement('div');
    card.className = 'card';
    card.style.opacity = '0.5';
    card.style.cursor = 'default';
    allCards[key] = card;

    const wtSeqHtml = seq
      ? `<div class="seq-row"><span class="seq-pos">${seq.seq_start}</span>${renderSequence(seq.wt_flank, seq.mut_idx, 'aa-wt-highlight')}</div>`
      : '';
    const mutSeqHtml = seq
      ? `<div class="seq-row"><span class="seq-pos">${seq.seq_start}</span>${renderSequence(seq.mut_flank, seq.mut_idx, 'aa-mut-highlight')}</div>`
      : '';

    card.innerHTML = `
      <div class="card-header">
        <div class="card-gene">${gene}</div>
        <div class="card-title">${gene} <span class="mutation">${mutation}</span></div>
      </div>
      <div class="card-badges">
        <span class="badge" style="background:#f3f4f6;color:#9ca3af;border:1px solid #e5e7eb;">No neo-PPIs</span>
      </div>
      <div class="seq-block">
        <div class="seq-label">Wild type</div>
        ${wtSeqHtml}
        <div class="seq-label" style="margin-top:6px;">Mutant</div>
        ${mutSeqHtml}
      </div>
    `;

    grid.appendChild(card);
  }

  // Filter logic
  filterEl.addEventListener('change', () => {
    const val = filterEl.value;
    for (const [key, card] of Object.entries(allCards)) {
      const gene = key.split('\t')[0];
      card.style.display = (val === 'all' || gene === val) ? '' : 'none';
    }
  });
}

init();
</script>
</body>
</html>
